<!DOCTYPE html>
<html>
<head>
  <title>Persistent Smart Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; text-align: center; margin:0; padding:10px; background:#f5f5f5; }
    h1 { margin-bottom:10px; }
    #reader { width:100%; max-width:350px; margin:auto; }
    #cart { list-style:none; padding:0; margin:0 auto; max-width:350px; }
    li { background:white; margin:5px; padding:10px; border-radius:8px; display:flex; justify-content: space-between; align-items:center; }
    button { padding:5px 10px; margin:0 2px; border:none; border-radius:6px; background:black; color:white; cursor:pointer; }
    .qty { margin: 0 5px; }
  </style>
</head>
<body>

<h1>📱 Persistent Smart Store</h1>
<div id="reader"></div>
<h2 id="result">Scan a product</h2>

<h3>🛒 Cart</h3>
<ul id="cart"></ul>
<h2 id="total">Total: $0.00</h2>
<button onclick="clearCart()">Clear Cart</button>

<script>
let cart = {};
let products = {};

// Load products from localStorage
if (localStorage.getItem("products")) {
  products = JSON.parse(localStorage.getItem("products"));
} else {
  // default products
  products = {
    "1001": { name: "Chips", price: 2.00 },
    "1002": { name: "Soda", price: 1.50 }
  };
}

// Save products to localStorage
function saveProducts() {
  localStorage.setItem("products", JSON.stringify(products));
}

function updateCartUI() {
  let cartUl = document.getElementById("cart");
  cartUl.innerHTML = "";
  let total = 0;

  for (let code in cart) {
    let item = cart[code];
    total += item.price * item.qty;

    let li = document.createElement("li");
    li.innerHTML = `
      <span>${item.name} - $${item.price.toFixed(2)}</span>
      <div>
        <button onclick="changeQty('${code}', -1)">-</button>
        <span class="qty">${item.qty}</span>
        <button onclick="changeQty('${code}', 1)">+</button>
        <button onclick="removeItem('${code}')">❌</button>
      </div>
    `;
    cartUl.appendChild(li);
  }

  document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
}

function changeQty(code, delta) {
  if (cart[code]) {
    cart[code].qty += delta;
    if (cart[code].qty <= 0) {
      delete cart[code];
    }
    updateCartUI();
  }
}

function removeItem(code) {
  delete cart[code];
  updateCartUI();
}

function clearCart() {
  cart = {};
  updateCartUI();
}

let lastScan = 0; // cooldown to prevent freeze

function onScanSuccess(code) {
  let now = Date.now();
  if (now - lastScan < 1000) return; // 1 second cooldown
  lastScan = now;

  let product = products[code];

  if (!product) {
    // prompt user to add new product
    let name = prompt("New product! Enter name for code: " + code);
    let price = parseFloat(prompt("Enter price for " + name));
    if (name && !isNaN(price)) {
      products[code] = { name: name, price: price };
      saveProducts(); // save permanently
      product = products[code];
      alert("✅ Product saved!");
    } else {
      alert("❌ Invalid input. Product not added.");
      return;
    }
  }

  // Add to cart
  if (cart[code]) {
    cart[code].qty += 1;
  } else {
    cart[code] = { name: product.name, price: product.price, qty: 1 };
  }

  updateCartUI();
  document.getElementById("result").innerText = "✅ Added: " + product.name;
}

// Initialize scanner
let scanner = new Html5Qrcode("reader");
Html5Qrcode.getCameras().then(devices => {
  let backCamera = devices.find(d =>
    d.label.toLowerCase().includes("back") || d.label.toLowerCase().includes("rear")
  );
  let cameraId = backCamera ? backCamera.id : devices[0].id;

  scanner.start(cameraId, { fps: 10, qrbox: 250 }, onScanSuccess);
}).catch(err => {
  // fallback
  scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
});
</script>

</body>
</html>
