<!DOCTYPE html>
<html>
<head>
  <title>Auto Store Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; text-align: center; margin:0; padding:10px; background:#f5f5f5; }
    h1 { margin-bottom:10px; }
    #reader { width:100%; max-width:350px; margin:auto; }
    #cart { list-style:none; padding:0; }
    li { background:white; margin:5px; padding:10px; border-radius:8px; }
    input { padding:10px; margin:5px; width:80%; max-width:250px; }
    button { padding:10px 15px; margin:5px; border:none; border-radius:8px; background:black; color:white; }
  </style>
</head>
<body>

<h1>📱 Auto Store</h1>
<div id="reader"></div>
<h2 id="result">Scan a product</h2>

<h3>🛒 Cart</h3>
<ul id="cart"></ul>
<h2 id="total">Total: $0.00</h2>
<button onclick="clearCart()">Clear Cart</button>

<script>
let products = {
  "1001": { name: "Chips", price: 2.00 },
  "1002": { name: "Soda", price: 1.50 }
};

let total = 0;

function addToCart(code, name, price) {
  let li = document.createElement("li");
  li.innerText = name + " - $" + price.toFixed(2);
  document.getElementById("cart").appendChild(li);

  total += price;
  document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
  document.getElementById("result").innerText = "✅ Added: " + name;
}

function onScanSuccess(code) {
  let product = products[code];

  if (product) {
    addToCart(code, product.name, product.price);
  } else {
    // Product not found → prompt user to add it automatically
    let name = prompt("New product! Enter name for code: " + code);
    let price = parseFloat(prompt("Enter price for " + name));

    if (name && !isNaN(price)) {
      products[code] = { name: name, price: price };
      addToCart(code, name, price);
      alert("✅ Product saved to system!");
    } else {
      alert("❌ Invalid input, product not added.");
    }
  }
}

function clearCart() {
  document.getElementById("cart").innerHTML = "";
  total = 0;
  document.getElementById("total").innerText = "Total: $0.00";
}

// Initialize scanner
let scanner = new Html5Qrcode("reader");
Html5Qrcode.getCameras().then(devices => {
  let backCamera = devices.find(device =>
    device.label.toLowerCase().includes("back") ||
    device.label.toLowerCase().includes("rear")
  );

  let cameraId = backCamera ? backCamera.id : devices[0].id;

  scanner.start(
    cameraId,
    { fps: 10, qrbox: 250 },
    onScanSuccess
  );
}).catch(err => {
  // fallback
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  );
});
</script>
</body>
</html>
